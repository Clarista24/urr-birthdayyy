<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday sayanggg 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ff4f81, #ff9ecf);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 40px 0;
}

.card {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    color: white;
    text-align: center;
    max-width: 500px;
    animation: fadeIn 1.5s ease-in-out;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    margin-bottom: 20px;
}

p {
    font-size: 14px;
    margin-bottom: 25px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff4f81;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff2e6f;
    color: white;
}

#surpriseBox {
    margin-top: 20px;
    animation: fadeIn 1s ease-in-out;
}

.hidden {
    display: none;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h1>Happy Birthday Sayang	🎉</h1>
    <h2>maaf aku cuma baru bisa kasih ini buat kamuuu 💖</h2>

    <p>
        Semoga apa yang kamu ceritain ke<br>
        aku selama ini tercapai yaa sayangg<br>
        ✨
    </p>

    <button onclick="surprise()">Klik untuk Surprise 🎁</button>

    <div id="surpriseBox" class="hidden">
        <h3>Kenangan Kita 📸💞</h3>

        <div class="gallery">
            <!-- GANTI FOTO DI SINI -->
            <img src="1.jpeg" onclick="openImage (this.src)">
            <img src="2.jpeg" onclick="openImage (this.src)">
            <img src="3.jpeg" onclick="openImage (this.src)">
            <img src="4.jpeg" onclick="openImage (this.src)">
            <img src="5.jpeg" onclick="openImage (this.src)">
            <img src="6.jpeg" onclick="openImage (this.src)">
            <img src="7.jpeg" onclick="openImage (this.src)">
            <img src="8.jpeg" onclick="openImage (this.src)">
            <img src="9.jpeg" onclick="openImage (this.src)">
            <img src="10.jpeg" onclick="openImage (this.src)">
            <img src="11.jpeg" onclick="openImage (this.src)">
            <img src="12.jpeg" onclick="openImage (this.src)">
            <img src="13.jpeg" onclick="openImage (this.src)">
            <img src="14.jpeg" onclick="openImage (this.src)">
            <img src="15.jpeg" onclick="openImage (this.src)">
   
         
        </div>
    </div>
</div>

<audio id="music" preload="auto">
<source src="lagu-ulangtahun.mp3.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function surprise() {
    const box = document.getElementById("surpriseBox");
    const music = document.getElementById("music");

    box.classList.toggle("hidden");

    if (!box.classList.contains("hidden")) {
        music.volume = 0.7;
        music.play();
        confetti({
            particleCount: 250,
            spread: 120,
            origin: { y: 0.6 }
        });
    } else {
        music.pause();
        music.currentTime = 0;
    }
}

function openImage (src) {
    const lightbox = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");

    lightbox.style.display = "block";
    img.src = src;

}

function closeImage() {
document.getElementById("lightbox").style.display = "none";

}
</script>

<!-- TARO LIGHTBOX DISINI-->
 <div id="lightbox">
    <span onclick="closeImage()">&times;</span>
    <img id="lightbox-img">
 </div>

</body>
</html>
